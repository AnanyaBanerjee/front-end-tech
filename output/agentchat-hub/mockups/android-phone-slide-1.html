<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- Export target: 1080×1920 (Android phone portrait — Google Play required) -->
  <meta name="viewport" content="width=1080" />
  <title>AgentChat Hub — Android Slide 1 — 1080×1920</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wdth,wght@12..96,75..125,700;12..96,75..125,800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="components/frames.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1080px; height: 1920px; overflow: hidden; background: #000; -webkit-font-smoothing: antialiased; }
    .bg-glow { position: absolute; inset: 0; background: radial-gradient(ellipse 90% 50% at 50% -5%, rgba(0,232,122,0.18) 0%, transparent 55%), #000; pointer-events: none; }
    .bg-grid { position: absolute; inset: 0; background-image: linear-gradient(rgba(0,232,122,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(0,232,122,0.04) 1px, transparent 1px); background-size: 64px 64px; pointer-events: none; }
    .accent-bar { position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, #00E87A, #22D3EE); z-index: 20; }
    .copy { position: absolute; top: 110px; left: 0; right: 0; text-align: center; padding: 0 72px; z-index: 10; }
    .eyebrow { font-family: 'Inter', sans-serif; font-size: 30px; font-weight: 500; letter-spacing: 0.16em; text-transform: uppercase; color: #00E87A; margin-bottom: 36px; }
    .headline { font-family: 'Bricolage Grotesque', system-ui, sans-serif; font-size: 108px; font-weight: 800; letter-spacing: -0.03em; line-height: 1.0; color: #fff; }
    .headline em { font-style: normal; background: linear-gradient(135deg, #00E87A 0%, #22D3EE 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .sub { margin-top: 36px; font-family: 'Inter', sans-serif; font-size: 44px; font-weight: 400; line-height: 1.3; color: rgba(255,255,255,0.52); }
    .device-wrap { position: absolute; bottom: -50px; left: 50%; transform: translateX(-50%); z-index: 15; }
    .device-wrap .android-px__frame { width: 560px; }
    .device-wrap .android-px__hole { width: 34px; height: 34px; top: 38px; }
    .device-wrap .android-px__btn--power { width: 6px; height: 110px; right: -6px; }
    .device-wrap .android-px__btn--vol { width: 6px; height: 160px; right: -6px; top: calc(22% + 130px); }
    .device-wrap .android-px__nav span { width: 14px; height: 14px; border-radius: 7px; }
    .device-wrap .android-px__nav span.wide { width: 48px; border-radius: 7px; }
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  <div class="bg-grid"></div>
  <div class="accent-bar"></div>
  <div class="copy">
    <div class="eyebrow">AgentChat Hub — Android</div>
    <div class="headline">All your<br/><em>agents.</em><br/>On Android.</div>
    <div class="sub">Any A2A endpoint. One URL.<br/>Start chatting in seconds.</div>
  </div>
  <div class="device-wrap">
    <div class="android-px">
      <div class="android-px__frame">
        <div class="android-px__hole"></div>
        <div class="android-px__btn--power"></div>
        <div class="android-px__btn--vol"></div>
        <div class="android-px__screen">
          <img src="../site/images/s05.png" alt="AgentChat Hub on Android — agent roster" />
        </div>
        <div class="android-px__nav">
          <span></span><span class="wide"></span><span></span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
