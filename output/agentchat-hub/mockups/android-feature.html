<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- Export: 1024×500 — Google Play feature graphic (required) -->
  <meta name="viewport" content="width=1024" />
  <title>Google Play Feature Graphic — 1024×500</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wdth,wght@12..96,75..125,700;12..96,75..125,800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="components/frames.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1024px; height: 500px; overflow: hidden; background: #07070a; -webkit-font-smoothing: antialiased; }

    /* Background layers */
    .bg-grid { position: absolute; inset: 0; background-image: linear-gradient(rgba(0,232,122,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(0,232,122,0.04) 1px, transparent 1px); background-size: 44px 44px; }
    .bg-left-glow { position: absolute; top: 50%; left: -100px; transform: translateY(-50%); width: 600px; height: 500px; background: radial-gradient(ellipse at center, rgba(0,232,122,0.20) 0%, transparent 60%); filter: blur(40px); }
    .bg-right-glow { position: absolute; top: 50%; right: -80px; transform: translateY(-50%); width: 500px; height: 400px; background: radial-gradient(ellipse at center, rgba(34,211,238,0.12) 0%, transparent 60%); filter: blur(40px); }

    /* Left: copy */
    .content {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      height: 100%;
    }
    .left {
      flex: 0 0 540px;
      padding: 48px 64px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 20px;
    }
    /* Logo row */
    .logo-row {
      display: flex; align-items: center; gap: 14px;
      margin-bottom: 4px;
    }
    .logo-mark {
      width: 44px; height: 44px;
      border-radius: 12px;
      background: linear-gradient(135deg, #00E87A 0%, #22D3EE 100%);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 24px; font-weight: 800; color: #000;
      flex-shrink: 0;
    }
    .logo-name {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 22px; font-weight: 700; color: rgba(255,255,255,0.75);
      letter-spacing: -0.01em;
    }
    /* Headline */
    .headline {
      font-family: 'Bricolage Grotesque', system-ui, sans-serif;
      font-size: 68px; font-weight: 800;
      letter-spacing: -0.034em; line-height: 0.96;
      color: #fff;
    }
    .headline em {
      font-style: normal;
      background: linear-gradient(125deg, #00E87A 0%, #22D3EE 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    /* Sub */
    .sub {
      font-family: 'Inter', sans-serif;
      font-size: 20px; font-weight: 400;
      color: rgba(255,255,255,0.42); line-height: 1.5;
    }
    /* Tag row */
    .tags {
      display: flex; align-items: center; gap: 10px;
      flex-wrap: wrap;
    }
    .tag {
      display: inline-flex; align-items: center; gap: 7px;
      background: rgba(0,232,122,0.09);
      border: 1px solid rgba(0,232,122,0.22);
      border-radius: 100px;
      padding: 6px 14px;
      font-family: 'Inter', sans-serif;
      font-size: 16px; font-weight: 500;
      color: #00E87A;
    }
    .tag-dot { width: 6px; height: 6px; background: #00E87A; border-radius: 50%; flex-shrink: 0; }

    /* Right: stacked phones */
    .right {
      flex: 1;
      position: relative;
      height: 100%;
      overflow: hidden;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 16px;
      padding-bottom: -40px;
    }
    /* Phone glow behind phones */
    .phones-glow {
      position: absolute;
      bottom: -60px; left: 50%;
      transform: translateX(-50%);
      width: 600px; height: 400px;
      background: radial-gradient(ellipse 60% 55% at 50% 70%, rgba(0,232,122,0.18) 0%, transparent 65%);
      filter: blur(32px);
      pointer-events: none;
    }
    .phone-item {
      position: relative;
      z-index: 5;
      margin-bottom: -36px; /* bleed off bottom */
    }
    .phone-item.back-left  { opacity: 0.45; transform: translateY(36px); margin-bottom: -72px; }
    .phone-item.back-right { opacity: 0.45; transform: translateY(36px); margin-bottom: -72px; }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-left-glow"></div>
  <div class="bg-right-glow"></div>

  <div class="content">
    <div class="left">
      <div class="logo-row">
        <div class="logo-mark">A</div>
        <div class="logo-name">AgentChat Hub</div>
      </div>
      <h1 class="headline">Chat with every<br><em>AI agent</em> you build.</h1>
      <p class="sub">Any A2A endpoint · Real-time streaming<br>No account · No tracking · Free forever</p>
      <div class="tags">
        <span class="tag"><span class="tag-dot"></span>iOS</span>
        <span class="tag"><span class="tag-dot"></span>Android</span>
        <span class="tag"><span class="tag-dot"></span>iPad</span>
        <span class="tag"><span class="tag-dot"></span>Mac</span>
      </div>
    </div>

    <div class="right">
      <div class="phones-glow"></div>
      <div class="phone-item back-left">
        <div class="iphone-pro" style="--scale: 0.52">
          <div class="iphone-pro__frame">
            <div class="iphone-pro__island"></div>
            <div class="iphone-pro__screen">
              <img src="images/s03.png" alt="" />
            </div>
            <div class="iphone-pro__bar"></div>
          </div>
        </div>
      </div>
      <div class="phone-item">
        <div class="iphone-pro" style="--scale: 0.62">
          <div class="iphone-pro__frame">
            <div class="iphone-pro__island"></div>
            <div class="iphone-pro__btn iphone-pro__btn--mute"></div>
            <div class="iphone-pro__btn iphone-pro__btn--vol-up"></div>
            <div class="iphone-pro__btn iphone-pro__btn--vol-dn"></div>
            <div class="iphone-pro__btn iphone-pro__btn--power"></div>
            <div class="iphone-pro__screen">
              <img src="images/s01.png" alt="AgentChat Hub" />
            </div>
            <div class="iphone-pro__bar"></div>
          </div>
        </div>
      </div>
      <div class="phone-item back-right">
        <div class="iphone-pro" style="--scale: 0.52">
          <div class="iphone-pro__frame">
            <div class="iphone-pro__island"></div>
            <div class="iphone-pro__screen">
              <img src="images/s02.png" alt="" />
            </div>
            <div class="iphone-pro__bar"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
