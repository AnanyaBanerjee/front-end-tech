<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- Export: 1320×2868 — iPhone 6.9" App Store (required) -->
  <meta name="viewport" content="width=1320" />
  <title>Slide 1 — 1320×2868</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wdth,wght@12..96,75..125,700;12..96,75..125,800;12..96,75..125,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="components/frames.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 1320px;
      height: 2868px;
      overflow: hidden;
      background: #07070a;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Layered background ─────────────────────────────── */
    .bg-base {
      position: absolute; inset: 0;
      background: #07070a;
    }
    /* Subtle grid */
    .bg-grid {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
      background-size: 80px 80px;
    }
    /* Top light source */
    .bg-top-glow {
      position: absolute;
      top: -200px; left: 50%;
      transform: translateX(-50%);
      width: 1600px; height: 900px;
      background: radial-gradient(ellipse at center, rgba(0,232,122,0.10) 0%, transparent 65%);
      filter: blur(30px);
    }

    /* ── Copy area ──────────────────────────────────────── */
    .copy {
      position: absolute;
      top: 0; left: 0; right: 0;
      padding: 120px 112px 0;
      z-index: 10;
    }
    /* Product badge */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      background: rgba(0,232,122,0.10);
      border: 1.5px solid rgba(0,232,122,0.28);
      border-radius: 100px;
      padding: 14px 28px;
      font-family: 'Inter', sans-serif;
      font-size: 36px;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: #00E87A;
      margin-bottom: 72px;
    }
    .badge-dot {
      width: 10px; height: 10px;
      background: #00E87A;
      border-radius: 50%;
    }
    /* Main headline */
    .headline {
      font-family: 'Bricolage Grotesque', system-ui, sans-serif;
      font-size: 186px;
      font-weight: 800;
      letter-spacing: -0.035em;
      line-height: 0.96;
      color: #ffffff;
      margin-bottom: 60px;
    }
    .headline em {
      font-style: normal;
      /* Gradient text — brand green to cyan */
      background: linear-gradient(125deg, #00E87A 0%, #22D3EE 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    /* Subtitle */
    .sub {
      font-family: 'Inter', sans-serif;
      font-size: 52px;
      font-weight: 400;
      line-height: 1.4;
      color: rgba(255,255,255,0.44);
      margin-bottom: 0;
    }
    /* Divider line */
    .divider {
      margin-top: 80px;
      width: 60px; height: 3px;
      background: linear-gradient(90deg, #00E87A, #22D3EE);
      border-radius: 2px;
    }

    /* ── Phone showcase ──────────────────────────────────── */
    .showcase {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      /* Top of showcase region — phone starts here */
      top: 1040px;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      z-index: 5;
      overflow: hidden;
    }
    /* Glow radiating from behind the phone */
    .phone-glow {
      position: absolute;
      bottom: -100px; left: 50%;
      transform: translateX(-50%);
      width: 1400px; height: 1000px;
      background: radial-gradient(
        ellipse 55% 50% at 50% 75%,
        rgba(0,232,122,0.20) 0%,
        rgba(0,232,122,0.08) 35%,
        rgba(34,211,238,0.04) 55%,
        transparent 72%
      );
      filter: blur(48px);
      pointer-events: none;
      z-index: 0;
    }
    /* Phone wrapper — positions and bleeds the frame */
    .phone-wrap {
      position: relative;
      z-index: 5;
      /* Bleed 180px off the bottom edge for dramatic crop */
      margin-bottom: -180px;
    }
  </style>
</head>
<body>
  <div class="bg-base"></div>
  <div class="bg-grid"></div>
  <div class="bg-top-glow"></div>

  <div class="copy">
    <div class="badge">
      <span class="badge-dot"></span>
      AgentChat Hub
    </div>
    <h1 class="headline">
      All your<br>
      <em>AI agents.</em><br>
      One place.
    </h1>
    <p class="sub">
      Connect any A2A endpoint with a URL.<br>
      No account. No setup. Free forever.
    </p>
    <div class="divider"></div>
  </div>

  <div class="showcase">
    <div class="phone-glow"></div>
    <div class="phone-wrap">
      <div class="iphone-pro" style="--scale: 2.19">
        <div class="iphone-pro__frame">
          <div class="iphone-pro__island"></div>
          <div class="iphone-pro__btn iphone-pro__btn--mute"></div>
          <div class="iphone-pro__btn iphone-pro__btn--vol-up"></div>
          <div class="iphone-pro__btn iphone-pro__btn--vol-dn"></div>
          <div class="iphone-pro__btn iphone-pro__btn--power"></div>
          <div class="iphone-pro__screen">
            <img src="images/s01.png" alt="AgentChat Hub — agent roster screen" />
          </div>
          <div class="iphone-pro__bar"></div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
