<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- Export target: 1242×2688 (iPhone 6.5" — required by App Store) -->
  <meta name="viewport" content="width=1242" />
  <title>AgentChat Hub — iOS 6.5" Slide 1 — 1242×2688</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wdth,wght@12..96,75..125,700;12..96,75..125,800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="components/frames.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1242px; height: 2688px; overflow: hidden; background: #000; -webkit-font-smoothing: antialiased; }
    .bg-glow { position: absolute; inset: 0; background: radial-gradient(ellipse 90% 45% at 50% -5%, rgba(0,232,122,0.18) 0%, transparent 60%), #000; pointer-events: none; }
    .bg-grid { position: absolute; inset: 0; background-image: linear-gradient(rgba(0,232,122,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(0,232,122,0.04) 1px, transparent 1px); background-size: 80px 80px; pointer-events: none; }
    .accent-bar { position: absolute; top: 0; left: 0; right: 0; height: 5px; background: linear-gradient(90deg, #00E87A, #22D3EE); z-index: 20; }
    .copy { position: absolute; top: 150px; left: 0; right: 0; text-align: center; padding: 0 90px; z-index: 10; }
    .eyebrow { font-family: 'Inter', sans-serif; font-size: 36px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: #00E87A; margin-bottom: 44px; }
    .headline { font-family: 'Bricolage Grotesque', system-ui, sans-serif; font-size: 138px; font-weight: 800; letter-spacing: -0.03em; line-height: 1.0; color: #fff; }
    .headline em { font-style: normal; background: linear-gradient(135deg, #00E87A 0%, #22D3EE 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .sub { margin-top: 48px; font-family: 'Inter', sans-serif; font-size: 54px; font-weight: 400; line-height: 1.3; color: rgba(255,255,255,0.55); }
    .device-wrap { position: absolute; bottom: -60px; left: 50%; transform: translateX(-50%); z-index: 15; }
    /* iPhone notch for 6.5" (older device) */
    .device-wrap .iphone-notch__frame { width: 680px; }
    .device-wrap .iphone-notch__pill { width: 210px; height: 56px; border-radius: 28px; top: 38px; }
    .device-wrap .iphone-notch__bar { width: 228px; height: 9px; bottom: 22px; }
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  <div class="bg-grid"></div>
  <div class="accent-bar"></div>
  <div class="copy">
    <div class="eyebrow">AgentChat Hub</div>
    <div class="headline">All your<br/><em>AI agents.</em><br/>One place.</div>
    <div class="sub">Connect any A2A-compatible agent<br/>with a single URL. No account needed.</div>
  </div>
  <div class="device-wrap">
    <div class="iphone-notch">
      <div class="iphone-notch__frame">
        <div class="iphone-notch__pill"></div>
        <div class="iphone-notch__screen">
          <img src="../site/images/s01.png" alt="AgentChat Hub — agent roster" />
        </div>
        <div class="iphone-notch__bar"></div>
      </div>
    </div>
  </div>
</body>
</html>
