<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- Export target: 2048×2732 (iPad Pro 12.9") -->
  <meta name="viewport" content="width=2048" />
  <title>AgentChat Hub — iPad Slide 1 — 2048×2732</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wdth,wght@12..96,75..125,700;12..96,75..125,800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="components/frames.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 2048px; height: 2732px; overflow: hidden; background: #000; -webkit-font-smoothing: antialiased; }
    .bg-glow { position: absolute; inset: 0; background: radial-gradient(ellipse 80% 40% at 50% -5%, rgba(0,232,122,0.16) 0%, transparent 55%), radial-gradient(ellipse 50% 25% at 15% 20%, rgba(34,211,238,0.08) 0%, transparent 45%), #000; pointer-events: none; }
    .bg-grid { position: absolute; inset: 0; background-image: linear-gradient(rgba(0,232,122,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,232,122,0.03) 1px, transparent 1px); background-size: 120px 120px; pointer-events: none; }
    .accent-bar { position: absolute; top: 0; left: 0; right: 0; height: 6px; background: linear-gradient(90deg, #00E87A, #22D3EE); z-index: 20; }
    .copy { position: absolute; top: 200px; left: 0; right: 0; text-align: center; padding: 0 160px; z-index: 10; }
    .eyebrow { font-family: 'Inter', sans-serif; font-size: 52px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: #00E87A; margin-bottom: 64px; }
    .headline { font-family: 'Bricolage Grotesque', system-ui, sans-serif; font-size: 200px; font-weight: 800; letter-spacing: -0.03em; line-height: 1.0; color: #fff; }
    .headline em { font-style: normal; background: linear-gradient(135deg, #00E87A 0%, #22D3EE 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .sub { margin-top: 72px; font-family: 'Inter', sans-serif; font-size: 76px; font-weight: 400; line-height: 1.3; color: rgba(255,255,255,0.5); }
    .device-wrap { position: absolute; bottom: -80px; left: 50%; transform: translateX(-50%); z-index: 15; }
    .device-wrap .ipad-pro__frame { width: 1160px; }
    .device-wrap .ipad-pro__island { width: 220px; height: 52px; border-radius: 26px; top: 40px; }
    .device-wrap .ipad-pro__bar { width: 320px; height: 10px; bottom: 22px; }
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  <div class="bg-grid"></div>
  <div class="accent-bar"></div>
  <div class="copy">
    <div class="eyebrow">AgentChat Hub — iPad</div>
    <div class="headline">Full screen.<br/><em>Full power.</em></div>
    <div class="sub">Your entire agent roster on iPad.<br/>Split view. Keyboard shortcuts. All of it.</div>
  </div>
  <div class="device-wrap">
    <div class="ipad-pro">
      <div class="ipad-pro__frame">
        <div class="ipad-pro__island"></div>
        <div class="ipad-pro__screen">
          <img src="../site/images/s08.png" alt="AgentChat Hub on iPad Pro — full screen agent chat" />
        </div>
        <div class="ipad-pro__bar"></div>
      </div>
    </div>
  </div>
</body>
</html>
