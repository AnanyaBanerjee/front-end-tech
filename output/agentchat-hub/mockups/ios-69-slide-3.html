<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- Export target: 1320×2868 -->
  <meta name="viewport" content="width=1320" />
  <title>AgentChat Hub — iOS Slide 3 — 1320×2868</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wdth,wght@12..96,75..125,700;12..96,75..125,800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="components/frames.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1320px; height: 2868px; overflow: hidden; background: #000; -webkit-font-smoothing: antialiased; }
    .bg-glow {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 70% 40% at 30% -5%, rgba(0,232,122,0.14) 0%, transparent 55%),
        radial-gradient(ellipse 50% 30% at 80% 15%, rgba(34,211,238,0.09) 0%, transparent 50%),
        #000;
      pointer-events: none;
    }
    .bg-grid {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(0,232,122,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,232,122,0.04) 1px, transparent 1px);
      background-size: 80px 80px; pointer-events: none;
    }
    .accent-bar { position: absolute; top: 0; left: 0; right: 0; height: 5px; background: linear-gradient(90deg, #00E87A, #22D3EE); z-index: 20; }
    .copy { position: absolute; top: 160px; left: 0; right: 0; text-align: center; padding: 0 100px; z-index: 10; }
    .eyebrow { font-family: 'Inter', sans-serif; font-size: 38px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: #00E87A; margin-bottom: 48px; }
    .headline { font-family: 'Bricolage Grotesque', system-ui, sans-serif; font-size: 148px; font-weight: 800; letter-spacing: -0.03em; line-height: 1.0; color: #fff; }
    .headline em { font-style: normal; background: linear-gradient(135deg, #00E87A 0%, #22D3EE 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .sub { margin-top: 52px; font-family: 'Inter', sans-serif; font-size: 58px; font-weight: 400; line-height: 1.3; color: rgba(255,255,255,0.55); }
    .device-wrap { position: absolute; bottom: -60px; left: 50%; transform: translateX(-50%); z-index: 15; }
    .device-wrap .iphone-pro__frame { width: 720px; }
    .device-wrap .iphone-pro__island { width: 172px; height: 56px; border-radius: 32px; top: 40px; }
    .device-wrap .iphone-pro__bar { width: 240px; height: 9px; bottom: 24px; }
    .device-wrap .iphone-pro__btn--power { width: 7px; height: 148px; right: -7px; }
    .device-wrap .iphone-pro__btn--vol-up { width: 7px; height: 96px; left: -7px; }
    .device-wrap .iphone-pro__btn--vol-dn { width: 7px; height: 96px; left: -7px; top: calc(22% + 124px); }
    .device-wrap .iphone-pro__btn--mute { width: 7px; height: 58px; left: -7px; }
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  <div class="bg-grid"></div>
  <div class="accent-bar"></div>
  <div class="copy">
    <div class="eyebrow">Organize your roster</div>
    <div class="headline">Groups<br/>for every<br/><em>workflow.</em></div>
    <div class="sub">Work. Research. Content. Data.<br/>Name your groups. Your agents follow.</div>
  </div>
  <div class="device-wrap">
    <div class="iphone-pro">
      <div class="iphone-pro__frame">
        <div class="iphone-pro__island"></div>
        <div class="iphone-pro__btn iphone-pro__btn--mute"></div>
        <div class="iphone-pro__btn iphone-pro__btn--vol-up"></div>
        <div class="iphone-pro__btn iphone-pro__btn--vol-dn"></div>
        <div class="iphone-pro__btn iphone-pro__btn--power"></div>
        <div class="iphone-pro__screen">
          <img src="../site/images/s03.png" alt="AgentChat Hub — agent groups organized by workflow" />
        </div>
        <div class="iphone-pro__bar"></div>
      </div>
    </div>
  </div>
</body>
</html>
