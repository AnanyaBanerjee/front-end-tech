<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- Export: 1320×2868 — iPhone 6.9" App Store -->
  <!-- Multi-phone feature strip — 3 phones with per-phone labels -->
  <meta name="viewport" content="width=1320" />
  <title>Feature Strip — 1320×2868</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wdth,wght@12..96,75..125,700;12..96,75..125,800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="components/frames.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 1320px; height: 2868px;
      overflow: hidden;
      background: #07070a;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Background ─────────────────────────────────────── */
    .bg-grid {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.016) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.016) 1px, transparent 1px);
      background-size: 88px 88px;
    }
    .bg-glow-top {
      position: absolute;
      top: -300px; left: 50%;
      transform: translateX(-50%);
      width: 1800px; height: 1200px;
      background: radial-gradient(ellipse at center,
        rgba(0,232,122,0.08) 0%,
        rgba(34,211,238,0.04) 35%,
        transparent 65%
      );
      filter: blur(40px);
    }

    /* ── Copy ───────────────────────────────────────────── */
    .copy {
      position: absolute;
      top: 0; left: 0; right: 0;
      padding: 112px 100px 0;
      z-index: 10;
    }
    .overline {
      font-family: 'Inter', sans-serif;
      font-size: 34px;
      font-weight: 500;
      letter-spacing: 0.20em;
      text-transform: uppercase;
      color: #00E87A;
      margin-bottom: 56px;
    }
    .headline {
      font-family: 'Bricolage Grotesque', system-ui, sans-serif;
      font-size: 170px;
      font-weight: 800;
      letter-spacing: -0.034em;
      line-height: 0.95;
      color: #fff;
      margin-bottom: 52px;
    }
    .headline em {
      font-style: normal;
      background: linear-gradient(125deg, #00E87A 0%, #22D3EE 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .sub {
      font-family: 'Inter', sans-serif;
      font-size: 46px;
      font-weight: 400;
      line-height: 1.4;
      color: rgba(255,255,255,0.40);
    }

    /* ── Phone strip ────────────────────────────────────── */
    /* Strip sits in the bottom ~1000px of the slide.
       3 phones at 360px wide (scale ≈ 0.916) in 1320px:
         3 × 360 + 2 × 20 (gap) + 2 × 70 (padding) = 1220px
    */
    .strip {
      position: absolute;
      bottom: 0;
      left: 0; right: 0;
      height: 1200px;          /* phone + label + bottom padding */
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 20px;
      padding: 0 70px 64px;
      z-index: 5;
    }
    /* Glow under the phone strip */
    .strip-glow {
      position: absolute;
      bottom: -60px; left: 50%;
      transform: translateX(-50%);
      width: 1500px; height: 700px;
      background: radial-gradient(
        ellipse 80% 55% at 50% 80%,
        rgba(0,232,122,0.16) 0%,
        rgba(34,211,238,0.06) 40%,
        transparent 65%
      );
      filter: blur(56px);
      pointer-events: none;
    }

    /* One phone column: label on top, phone below */
    .phone-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      position: relative;
      z-index: 5;
    }
    /* Feature label */
    .phone-label {
      text-align: center;
      padding-bottom: 32px;
    }
    .label-icon {
      font-size: 36px;
      margin-bottom: 12px;
      display: block;
      line-height: 1;
    }
    .label-title {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 46px;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.1;
      color: rgba(255,255,255,0.90);
      display: block;
    }
    .label-sub {
      font-family: 'Inter', sans-serif;
      font-size: 30px;
      font-weight: 400;
      color: rgba(255,255,255,0.36);
      display: block;
      margin-top: 10px;
    }
    /* Active/highlighted phone column */
    .phone-col.hero .label-title { color: #00E87A; }

    /* Phone bleed — bottom crops into padding for drama */
    .phone-col .iphone-pro {
      margin-bottom: -64px;
    }

    /* Thin separator between columns */
    .col-sep {
      width: 1px;
      height: 80%;
      background: rgba(255,255,255,0.05);
      align-self: center;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow-top"></div>

  <div class="copy">
    <div class="overline">AgentChat Hub · iOS · Android · iPad · Mac</div>
    <h1 class="headline">
      Every agent.<br>
      Every <em>workflow.</em>
    </h1>
    <p class="sub">
      Connect any A2A endpoint from anywhere.<br>
      Organize, chat, and stream — all in one app.
    </p>
  </div>

  <div class="strip">
    <div class="strip-glow"></div>

    <!-- Phone 1 -->
    <div class="phone-col">
      <div class="phone-label">
        <span class="label-icon">⚡</span>
        <span class="label-title">Add any agent</span>
        <span class="label-sub">Paste a URL. Done.</span>
      </div>
      <div class="iphone-pro" style="--scale: 0.916">
        <div class="iphone-pro__frame">
          <div class="iphone-pro__island"></div>
          <div class="iphone-pro__btn iphone-pro__btn--mute"></div>
          <div class="iphone-pro__btn iphone-pro__btn--vol-up"></div>
          <div class="iphone-pro__btn iphone-pro__btn--vol-dn"></div>
          <div class="iphone-pro__btn iphone-pro__btn--power"></div>
          <div class="iphone-pro__screen">
            <img src="images/s01.png" alt="Agent roster" />
          </div>
          <div class="iphone-pro__bar"></div>
        </div>
      </div>
    </div>

    <div class="col-sep"></div>

    <!-- Phone 2 — hero/center -->
    <div class="phone-col hero">
      <div class="phone-label">
        <span class="label-icon">🔴</span>
        <span class="label-title">Live streaming</span>
        <span class="label-sub">Token by token, real-time.</span>
      </div>
      <div class="iphone-pro" style="--scale: 0.916">
        <div class="iphone-pro__frame">
          <div class="iphone-pro__island"></div>
          <div class="iphone-pro__btn iphone-pro__btn--mute"></div>
          <div class="iphone-pro__btn iphone-pro__btn--vol-up"></div>
          <div class="iphone-pro__btn iphone-pro__btn--vol-dn"></div>
          <div class="iphone-pro__btn iphone-pro__btn--power"></div>
          <div class="iphone-pro__screen">
            <img src="images/s02.png" alt="Streaming response" />
          </div>
          <div class="iphone-pro__bar"></div>
        </div>
      </div>
    </div>

    <div class="col-sep"></div>

    <!-- Phone 3 -->
    <div class="phone-col">
      <div class="phone-label">
        <span class="label-icon">📂</span>
        <span class="label-title">Custom groups</span>
        <span class="label-sub">Organize by workflow.</span>
      </div>
      <div class="iphone-pro" style="--scale: 0.916">
        <div class="iphone-pro__frame">
          <div class="iphone-pro__island"></div>
          <div class="iphone-pro__btn iphone-pro__btn--mute"></div>
          <div class="iphone-pro__btn iphone-pro__btn--vol-up"></div>
          <div class="iphone-pro__btn iphone-pro__btn--vol-dn"></div>
          <div class="iphone-pro__btn iphone-pro__btn--power"></div>
          <div class="iphone-pro__screen">
            <img src="images/s03.png" alt="Agent groups" />
          </div>
          <div class="iphone-pro__bar"></div>
        </div>
      </div>
    </div>

  </div>
</body>
</html>
